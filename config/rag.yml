# Model configuration.
# Works with any OpenAI-compatible endpoint (OpenAI, Azure OpenAI, local models, etc.).
# To use a different provider, set OPENAI_BASE_URL and the model names in your .env.
chat_model_name: ${LLM_MODEL:-gpt-4o-mini}
embedding_model_name: ${EMBEDDING_MODEL:-text-embedding-3-small}

# Credentials & endpoint are read from environment / .env (never hard-code secrets here)
api_key: ${OPENAI_API_KEY}
base_url: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
