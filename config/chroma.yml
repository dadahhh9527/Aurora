collection_name: agent
persist_directory: chroma_db
data_path: data
md5_hex_store: md5.text
allow_knowledge_file_type: ["txt", "pdf"]

# Text splitting (re-ingest after changing these for existing data to take effect)
chunk_size: 400
chunk_overlap: 50
# Split on paragraphs/newlines first, then sentence punctuation
separators: ["\n\n", "\n", ". ", "! ", "? ", "; ", " ", ""]

# Retrieval parameters
k: 3                    # number of chunks finally passed to the model
candidate_k: 20         # initial recall candidates (used for threshold filtering / rerank)
score_threshold: 0.3    # relevance score threshold; chunks below this are dropped as irrelevant

# Reranking: requires a rerank-capable endpoint; disabled by default.
# When enabled, recall candidate_k chunks first, then rerank down to k.
rerank_enabled: false
rerank_model: gte-rerank-v2
