<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora · Robot Vacuum Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%230d9488'/%3E%3Cpath d='M9 20c3-6 11-6 14 0' stroke='white' stroke-width='2.4' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='12' r='2.2' fill='white'/%3E%3C/svg%3E" />
</head>
<body>
  <div class="app">
    <!-- Brand header -->
    <header class="topbar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="34" height="34">
            <circle cx="16" cy="16" r="15" fill="url(#g)"></circle>
            <path d="M8 21c3.5-7 12.5-7 16 0" stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round"></path>
            <circle cx="16" cy="12" r="2.6" fill="#fff"></circle>
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#14b8a6"></stop>
                <stop offset="1" stop-color="#0d9488"></stop>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <div class="brand__text">
          <h1 class="brand__name">Aurora</h1>
          <p class="brand__sub">Robot Vacuum · AI Support</p>
        </div>
      </div>
      <div class="topbar__actions">
        <button id="new-chat" class="topbar__button" type="button">New chat</button>
        <a id="admin-link" class="topbar__button" href="/admin" hidden>Admin</a>
        <span id="current-user" class="status__label"></span>
        <button id="logout" class="topbar__button" type="button">Log out</button>
        <div class="status">
          <span class="status__dot"></span>
          <span class="status__label">Online</span>
        </div>
      </div>
    </header>

    <!-- Messages -->
    <main id="messages" class="messages">
      <section id="welcome" class="welcome">
        <div class="welcome__avatar">
          <svg viewBox="0 0 32 32" width="52" height="52">
            <circle cx="16" cy="16" r="15" fill="url(#g2)"></circle>
            <path d="M8 21c3.5-7 12.5-7 16 0" stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round"></path>
            <circle cx="16" cy="12" r="2.6" fill="#fff"></circle>
            <defs>
              <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#2dd4bf"></stop>
                <stop offset="1" stop-color="#0d9488"></stop>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2 class="welcome__title">Hi, I'm Aurora 👋</h2>
        <p class="welcome__desc">Ask me anything about choosing, using, cleaning, maintaining, or troubleshooting your robot vacuum or vacuum-and-mop combo.</p>
        <div class="chips" id="suggestions">
          <button class="chip" type="button">Which robot vacuum suits a small apartment?</button>
          <button class="chip" type="button">How often should I clean the mop pads?</button>
          <button class="chip" type="button">My robot keeps getting stuck on thresholds — what can I do?</button>
          <button class="chip" type="button">Generate my usage report for this month</button>
        </div>
      </section>
    </main>

    <!-- Composer -->
    <footer class="composer">
      <form id="chat-form" class="composer__form" autocomplete="off">
        <textarea
          id="input"
          class="composer__input"
          rows="1"
          placeholder="Ask a question — Enter to send, Shift + Enter for a new line"
          maxlength="1000"></textarea>
        <button id="send" class="composer__send" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M4 12l16-8-6 8 6 8-16-8z" fill="currentColor"></path>
          </svg>
        </button>
      </form>
      <p class="composer__tip">Responses are AI-generated and for reference only — always defer to the official manual.</p>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
